name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # ဒါလေး ထပ်ဖြည့်လိုက်တာပါ (Flutter ကိရိယာတပ်ဆင်ခြင်း)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Flet APK
        run: flet build apk --project-name "REDashboard" --project-version "1.0.0"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RE-Dashboard-App
          path: build/apk/**/*.apk
          
